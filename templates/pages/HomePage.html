<body>
  <header>
    <nav>
      <ul class="nav-links">
        <li><a href="" class="nav-link" data-category="woman">Woman</a></li>
        <li><a href="" class="nav-link" data-category="man">Man</a></li>
        <li><a href="" class="nav-link" data-category="teen">Teen</a></li>
        <li><a href="" class="nav-link" data-category="kids">Kids</a></li>
      </ul>
      <ul class="nav-icons">
        <li><a href="" class="nav-icon" data-search-toggle aria-label="Open search" aria-expanded="false"> <img
              src="./assets/icons/search.svg" alt=""> </a></li>
        <li><a href="#favorites" class="nav-icon" aria-label="Favorites"> <img src="./assets/icons/love.svg" alt="">
          </a></li>
        <li><a href="" class="nav-icon bag" data-cart-toggle aria-label="Open shopping bag" aria-expanded="false"> <img
              src="./assets/icons/bag.svg" alt="">
            <div class="dot"></div>
          </a></li>
        <li><a href="#profile" class="nav-icon" aria-label="Profile"> <img src="./assets/icons/avatar.svg" alt=""> </a>
        </li>
      </ul>
    </nav>
    <div class="search-panel" data-search-panel>
      <form class="search-panel__form" data-search-form>
        <input class="search-panel__input" id="site-search" name="search" data-search-input type="search"
          placeholder="search" autocomplete="off">
      </form>
    </div>
  </header>

  <div class="cart-shell" data-cart-shell aria-hidden="true">
    <button class="cart-backdrop" type="button" data-cart-close aria-label="Close shopping bag"></button>
    <aside class="cart-sidebar" role="dialog" aria-modal="true" aria-labelledby="cart-title">
      <div class="cart-sidebar__header">
        <h2 id="cart-title">Shopping bag</h2>
        <button class="cart-sidebar__close" type="button" data-cart-close
          aria-label="Close shopping bag">&times;</button>
      </div>
      <div class="cart-sidebar__body">
        <p class="cart-sidebar__empty">Your bag is empty.</p>
      </div>
    </aside>
  </div>

  <main>
    <div class="hero">
      <p class="basics">Basics</p>
      <p class="charm">Charm</p>
    </div>

    <section class="gallery-section">
      <div class="menu">
        <div class="filters">
          <p>New Arrivals</p>
          <a href="" class="filter">
            <img class="filter-icon" src="./assets/icons/filter.svg" alt="filters">
            <p>filter and order</p>
          </a>
        </div>
        <div class="disposition">
          <ul>
            <li><a class="carousell active" href="">Carousell</a></li>
            <li><a class="cards" href="">Cards</a></li>
          </ul>
        </div>
      </div>
      <div class="carousel">
        <button class="carousel__button carousel__button--prev" type="button" data-carousel-prev
          aria-label="Previous product">&lt;</button>
        <div class="gallery" data-gallery></div>
        <button class="carousel__button carousel__button--next" type="button" data-carousel-next
          aria-label="Next product">&gt;</button>
      </div>

      <template class="container" data-fashion-card>
        <article class="card">
          <div class="card-box">
            <img class="card__image" data-image />
          </div>

          <div class="credits">
            <p class="card__credit">
              <a data-author target="_blank" rel="noreferrer"></a>
            </p>
            <p class="card__name" data-name></p>
            <p class="price">€ 22.99</p>
            <button class="favorite-toggle" type="button" data-favorite-toggle aria-pressed="false"
              aria-label="Add to favorites">
              <img src="./assets/icons/love.svg" alt="">
            </button>
          </div>

        </article>
      </template>
    </section>
  </main>
</body>
